name: Assemble daed source

# Assembles one pinned, self-contained daed source tarball (all repos at fixed
# commits from ci/pins.env + prebuilt web), uploads it to the daed-src release,
# and writes PKG_HASH into daed/Makefile. SDK builds then just go-compile it.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Load pins
        run: cat ci/pins.env | grep -E '^[A-Z]' >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Assemble source tree
        run: |
          set -eux
          OUT="daed-${DAED_VERSION}"
          rm -rf "$OUT"; mkdir -p "$OUT"

          fetch_at() { # <url> <dir> <commit>
            git clone --filter=blob:none --no-checkout "$1" "$2"
            git -C "$2" checkout "$3"
          }

          fetch_at https://github.com/daeuniverse/daed "$OUT" "$DAED_COMMIT"
          rm -rf "$OUT/wing"
          fetch_at https://github.com/daeuniverse/dae-wing "$OUT/wing" "$WING_COMMIT"
          rm -rf "$OUT/wing/dae-core"
          fetch_at https://github.com/kenzok8/dae "$OUT/wing/dae-core" "$CORE_COMMIT"
          # route A: merge upstream dae main onto the frozen olicesx perf base so the
          # core tracks official while keeping the eBPF/perf fork. A merge conflict
          # fails the build (gate) and signals a manual rebase is needed.
          git -C "$OUT/wing/dae-core" fetch --no-tags https://github.com/daeuniverse/dae "$CORE_UPSTREAM_COMMIT"
          git -C "$OUT/wing/dae-core" -c user.email=ci@local -c user.name=ci merge --no-edit "$CORE_UPSTREAM_COMMIT"
          git -C "$OUT/wing/dae-core" submodule update --init
          fetch_at https://github.com/kenzok8/outbound "$OUT/outbound" "$OUTBOUND_COMMIT"
          # quic-go: fetch the base, then apply our self-owned perf patches instead
          # of depending on the olicesx perf branch. Reproduces the same tree.
          fetch_at https://github.com/kenzok8/quic-go "$OUT/quic-go" "$QUICGO_BASE_COMMIT"
          git -C "$OUT/quic-go" -c user.name=ci -c user.email=ci@local \
              am "$GITHUB_WORKSPACE"/ci/patches/quic-go/*.patch

          # Freeze go deps so the SDK build is deterministic.
          ( cd "$OUT/wing/dae-core" && go mod tidy )
          ( cd "$OUT/wing" \
              && go mod edit -replace github.com/daeuniverse/outbound=../outbound \
              && go mod edit -replace github.com/daeuniverse/quic-go=../quic-go \
              && go mod tidy \
              && cp "$GITHUB_WORKSPACE/ci/default.pgo" default.pgo )

          # Prebuild web and embed. Upstream occasionally updates workspace
          # catalog specifiers without refreshing pnpm-lock.yaml; normalize the
          # pinned source lockfile first, then do the real frozen install.
          corepack enable pnpm
          ( cd "$OUT" \
              && pnpm install --lockfile-only --ignore-scripts \
              && pnpm install --frozen-lockfile \
              && pnpm build --filter daed )
          mkdir -p "$OUT/wing/webrender/web"
          cp -rf "$OUT/apps/web/dist/"* "$OUT/wing/webrender/web/"
          find "$OUT/wing/webrender/web" -name "*.map" -type f -delete
          find "$OUT/wing/webrender/web" -type f -size +4k ! -name "*.gz" ! -name "*.woff" ! -name "*.woff2" \
            -exec sh -c 'gzip -9 -k "$1"; [ "$(stat -c%s "$1")" -lt "$(stat -c%s "$1.gz")" ] && rm "$1.gz" || rm "$1"' _ {} \;

          # Strip VCS / node junk; go module deps are fetched via go.sum at build time.
          find "$OUT" -name .git -type d -prune -exec rm -rf {} +
          find "$OUT" -name node_modules -type d -prune -exec rm -rf {} +

          # Unique id from the exact pin set: identical pins reproduce the same
          # name (idempotent), different content gets a different name - so a
          # second assemble on the same date never clobbers an older tarball
          # that older commits still reference via PKG_HASH.
          SRC_ID=$(printf '%s' "${DAED_COMMIT}${WING_COMMIT}${CORE_COMMIT}${CORE_UPSTREAM_COMMIT}${OUTBOUND_COMMIT}${QUICGO_BASE_COMMIT}" | sha256sum | cut -c1-12)
          TARBALL="daed-src-${DAED_VERSION}-${SRC_ID}.tar.gz"
          tar --numeric-owner --owner=0 --group=0 --sort=name -czf "$TARBALL" "$OUT"
          echo "PKG_HASH=$(sha256sum "$TARBALL" | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Publish to daed-src release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view daed-src --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create daed-src --repo "${{ github.repository }}" \
              --title "daed pinned source" --notes "Auto-assembled daed source tarballs (newest 3 kept)." --latest=false
          gh release upload daed-src "$TARBALL" --repo "${{ github.repository }}" --clobber
          # bound growth: keep only the newest 3 tarballs (never the release/tag)
          gh release view daed-src --repo "${{ github.repository }}" --json assets \
            --jq '.assets | sort_by(.createdAt) | reverse | .[3:] | .[].name' \
            | while read -r old; do
                [ -n "$old" ] && gh release delete-asset daed-src "$old" --repo "${{ github.repository }}" -y
              done

      - name: Write PKG_HASH into Makefile and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          cur_ver=$(sed -n 's/^PKG_VERSION:=//p' daed/Makefile)
          cur_rel=$(sed -n 's/^PKG_RELEASE:=//p' daed/Makefile)
          if [ "$cur_ver" = "${DAED_VERSION}" ] && grep -qx "PKG_SOURCE:=${TARBALL}" daed/Makefile; then
            echo "no change"; exit 0
          fi
          if [ "$cur_ver" = "${DAED_VERSION}" ]; then
            rel=$((cur_rel + 1))
          else
            rel=1
          fi
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${DAED_VERSION}/" daed/Makefile
          sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=${rel}/" daed/Makefile
          sed -i "s|^PKG_SOURCE:=.*|PKG_SOURCE:=${TARBALL}|" daed/Makefile
          sed -i "s/^PKG_HASH:=.*/PKG_HASH:=${PKG_HASH}/" daed/Makefile
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daed/Makefile
          git diff --cached --quiet && { echo "no change"; exit 0; }
          git commit -m "chore(daed): assemble pinned source ${DAED_VERSION}-${rel}"
          git push origin "HEAD:${{ github.ref_name }}"
